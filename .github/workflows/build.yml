name: Build OpenWrt for WR1200JS

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        required: false
        default: '24.10.7'
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  OPENWRT_VERSION: '24.10.7'
  TARGET: 'ramips'
  SUBTARGET: 'mt7621'
  PROFILE: 'youhua_wr1200js'
  DEVICE_NAME: 'WR1200JS'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 zstd \
            squashfs-tools

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.openwrt_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.OPENWRT_VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Download ImageBuilder
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IB_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/openwrt-imagebuilder-${VERSION}-${TARGET}-${SUBTARGET}.Linux-x86_64.tar.zst"
          echo "Downloading ImageBuilder: $IB_URL"
          curl -L --retry 5 --retry-delay 15 --connect-timeout 30 -o imagebuilder.tar.zst "$IB_URL"
          echo "Download complete ($(du -h imagebuilder.tar.zst | cut -f1)), extracting..."
          mkdir -p openwrt-ib
          zstd -d imagebuilder.tar.zst -o imagebuilder.tar
          tar xf imagebuilder.tar --strip-components=1 -C openwrt-ib
          rm -f imagebuilder.tar.zst imagebuilder.tar
          echo "ImageBuilder ready: openwrt-ib"
          ls openwrt-ib/

      - name: Download Argon theme
        run: |
          echo "=== Downloading luci-theme-argon .ipk ==="

          # 尝试多个来源下载 (含文件类型验证)
          DOWNLOAD_OK=0
          mkdir -p /tmp/argon-files

          for URL in \
            "https://dl.openwrt.ai/latest/packages/mipsel_24kc/kiddin9/luci-theme-argon_2.4.3-r3_all.ipk" \
            "https://dl.openwrt.ai/releases/25.12/packages/mipsel_24kc/kiddin9/luci-theme-argon_2.4.3-r3_all.ipk" \
            "https://dl.openwrt.ai/releases/24.10/packages/mipsel_24kc/kiddin9/luci-theme-argon_2.4.3-r3_all.ipk"; do
            echo "Trying: $URL"
            curl -L --retry 2 --retry-delay 3 --connect-timeout 20 \
              -o /tmp/luci-theme-argon.ipk "$URL" 2>/dev/null
            SIZE=$(stat -c%s /tmp/luci-theme-argon.ipk 2>/dev/null || echo 0)
            FILE_TYPE=$(file /tmp/luci-theme-argon.ipk 2>/dev/null | head -1)
            if [ "$SIZE" -gt 1000 ] && echo "$FILE_TYPE" | grep -qiE 'gzip|tar|ar|archive'; then
              echo "✅ Downloaded argon theme (${SIZE} bytes)"
              DOWNLOAD_OK=1
              break
            else
              echo "   Failed (${SIZE} bytes, type: ${FILE_TYPE})"
            fi
          done

          if [ "$DOWNLOAD_OK" = "0" ]; then
            echo "⚠ WARNING: Failed to download luci-theme-argon, continuing without theme"
          else
            echo "Downloaded:"
            ls -lh /tmp/luci-theme-argon.ipk

            cd /tmp/argon-files
            rm -f debian-binary control.tar.gz control.tar.xz data.tar.gz data.tar.xz

            # .ipk 可能被额外 gzip 包装
            if file /tmp/luci-theme-argon.ipk | grep -q gzip; then
              mv /tmp/luci-theme-argon.ipk /tmp/luci-theme-argon.ipk.gz
              gzip -d /tmp/luci-theme-argon.ipk.gz
            fi

            # 提取 ipk
            ar x /tmp/luci-theme-argon.ipk 2>/dev/null || tar xf /tmp/luci-theme-argon.ipk 2>/dev/null

            # 提取 data.tar
            if [ -f data.tar.xz ]; then
              tar -xJf data.tar.xz 2>/dev/null
            elif [ -f data.tar.gz ]; then
              tar -xzf data.tar.gz 2>/dev/null
            fi

            echo "=== Argon theme files ==="
            find . -type f | head -20
            rm -f debian-binary control.tar.gz control.tar.xz data.tar.gz data.tar.xz
          fi

          # === 下载 luci-app-wizard 配置向导 ===
          echo "=== 下载 luci-app-wizard ==="
          mkdir -p /tmp/argon-files
          WIZARD_URL="https://dl.openwrt.ai/latest/packages/mipsel_24kc/kiddin9/luci-app-wizard_27.090.45134~029b517_all.ipk"
          curl -L --retry 3 --retry-delay 5 --connect-timeout 30 \
            -o /tmp/luci-app-wizard.ipk "$WIZARD_URL"
          WIZARD_SIZE=$(stat -c%s /tmp/luci-app-wizard.ipk 2>/dev/null || echo 0)
          if [ "$WIZARD_SIZE" -gt 1000 ]; then
            echo "✅ luci-app-wizard 下载成功 (${WIZARD_SIZE} bytes)"
            # 检查是否被 gzip 包装
            if file /tmp/luci-app-wizard.ipk | grep -q gzip; then
              echo "wizard ipk is gzip-compressed, decompressing..."
              mv /tmp/luci-app-wizard.ipk /tmp/luci-app-wizard.ipk.gz
              gzip -d /tmp/luci-app-wizard.ipk.gz
            fi
            cd /tmp
            mkdir -p wizard-extract
            cd wizard-extract
            ar x /tmp/luci-app-wizard.ipk || tar xf /tmp/luci-app-wizard.ipk
            if [ -f data.tar.xz ]; then
              tar -xJf data.tar.xz -C /tmp/argon-files
            elif [ -f data.tar.gz ]; then
              tar -xzf data.tar.gz -C /tmp/argon-files
            fi
            cd /tmp/argon-files
            rm -rf /tmp/wizard-extract
            echo "=== Wizard files ==="
            find . -path '*/wizard*' -type f
          else
            echo "⚠ luci-app-wizard 下载失败, 跳过"
          fi

          # === 下载 iStore 安装脚本 ===
          echo "=== 下载 iStore 安装脚本 ==="
          mkdir -p /tmp/argon-files/usr/share/systools

          # 下载 istore-reinstall.run (iStore 官方安装脚本, ~1KB)
          curl -L --retry 3 --retry-delay 5 --connect-timeout 20 \
            -o /tmp/argon-files/usr/share/systools/istore-reinstall.run \
            "https://github.com/linkease/openwrt-app-actions/raw/main/applications/luci-app-systools/root/usr/share/systools/istore-reinstall.run" 2>/dev/null
          ISTORE_SIZE=$(stat -c%s /tmp/argon-files/usr/share/systools/istore-reinstall.run 2>/dev/null || echo 0)
          echo "iStore 脚本: ${ISTORE_SIZE} bytes"
          chmod +x /tmp/argon-files/usr/share/systools/istore-reinstall.run 2>/dev/null || true

          # === UCI defaults: 首次开机自动配置 ===
          echo "=== 创建 UCI defaults 快速配置 ==="
          cd /tmp/argon-files
          mkdir -p /tmp/argon-files/etc/uci-defaults
          UCI=/tmp/argon-files/etc/uci-defaults/90-wr1200js-setup

          echo '#!/bin/sh' > $UCI
          echo '# WR1200JS 首次开机快速配置' >> $UCI
          echo '' >> $UCI

          # 1. LAN IP
          echo "uci set network.lan.ipaddr='192.168.2.1'" >> $UCI
          echo "uci set network.lan.netmask='255.255.255.0'" >> $UCI
          echo "uci set network.lan.dns='8.8.8.8'" >> $UCI
          echo "uci set network.lan.dns='8.8.4.4'" >> $UCI
          echo '' >> $UCI

          # 2. WiFi 双频分开
          echo "uci set wireless.radio0.disabled='0'" >> $UCI
          echo "uci set wireless.radio1.disabled='0'" >> $UCI
          echo "uci delete wireless.radio0.multi_ap 2>/dev/null" >> $UCI
          echo "uci delete wireless.radio1.multi_ap 2>/dev/null" >> $UCI
          echo "uci set wireless.default_radio0.mode='ap'" >> $UCI
          echo "uci set wireless.default_radio0.ssid='OPENWRT'" >> $UCI
          echo "uci set wireless.default_radio0.encryption='none'" >> $UCI
          echo "uci set wireless.default_radio0.network='lan'" >> $UCI
          echo "uci set wireless.default_radio1.mode='ap'" >> $UCI
          echo "uci set wireless.default_radio1.ssid='OPENWRT-5G'" >> $UCI
          echo "uci set wireless.default_radio1.encryption='none'" >> $UCI
          echo "uci set wireless.default_radio1.network='lan'" >> $UCI
          echo '' >> $UCI

          # 3. 时区
          echo "uci set system.@system[0].timezone='CST-8'" >> $UCI
          echo "uci set system.@system[0].zonename='Asia/Shanghai'" >> $UCI
          echo "uci set system.@system[0].hostname='WR1200JS'" >> $UCI
          echo '' >> $UCI

          # 4. DHCP
          echo "uci delete dhcp.lan 2>/dev/null" >> $UCI
          echo "uci set dhcp.lan=dhcp" >> $UCI
          echo "uci set dhcp.lan.interface='lan'" >> $UCI
          echo "uci set dhcp.lan.start='100'" >> $UCI
          echo "uci set dhcp.lan.limit='150'" >> $UCI
          echo "uci set dhcp.lan.leasetime='12h'" >> $UCI
          echo '' >> $UCI

          # 5. Wizard 向导配置
          echo "uci set wizard.default=wizard" >> $UCI
          echo "uci set wizard.default.landing_page='wizard'" >> $UCI
          echo '' >> $UCI

          # 6. iStore 首次安装
          echo "# 安装 iStore 应用商店 (首次启动)" >> $UCI
          echo "if [ -f /usr/share/systools/istore-reinstall.run ]; then" >> $UCI
          echo "  /usr/share/systools/istore-reinstall.run &" >> $UCI
          echo "fi" >> $UCI
          echo '' >> $UCI

          # 7. 提交
          echo "uci commit network" >> $UCI
          echo "uci commit wireless" >> $UCI
          echo "uci commit system" >> $UCI
          echo "uci commit dhcp" >> $UCI
          echo "uci commit wizard" >> $UCI
          echo "exit 0" >> $UCI

          chmod +x $UCI
          echo "✅ 快速配置脚本已创建"
          cat $UCI

          # === 添加 kiddin9 软件源 (iStore 依赖 + 后续插件安装) ===
          echo "=== 添加 kiddin9 软件源 ==="
          mkdir -p /tmp/argon-files/etc/opkg
          cat > /tmp/argon-files/etc/opkg/customfeeds.conf << 'FEED_EOF'
          src/gz kiddin9_packages https://dl.openwrt.ai/releases/25.12/packages/mipsel_24kc/kiddin9
          src/gz kiddin9_base https://dl.openwrt.ai/releases/25.12/targets/ramips/mt7621/packages
          FEED_EOF
          # 移除行首空格 (heredoc 缩进导致的问题)
          sed -i 's/^          //' /tmp/argon-files/etc/opkg/customfeeds.conf
          echo "✅ kiddin9 软件源已添加"
          cat /tmp/argon-files/etc/opkg/customfeeds.conf

          echo "FILES directory ready:"
          find . -type d | sort

      - name: Build firmware
        run: |
          cd openwrt-ib

          # 软件包列表 - 精简以适配 16MB flash
          # 已移除: samba4 (大体积), adblock (可后期安装), wireguard, mihomo/fchomo
          # 保留: LuCI, WiFi, PPPoE, USB, SmartDNS, SQM, DDNS, UPnP, 工具
          # iStore 应用商店通过 FILES 注入, 后续可通过 iStore 安装各类插件
          PACKAGES="\
            luci luci-i18n-base-zh-cn luci-compat luci-lib-ipkg \
            -wpad-basic-mbedtls wpad-openssl \
            luci-proto-ppp ppp-mod-pppoe \
            block-mount kmod-usb-storage kmod-usb-storage-extras \
            kmod-fs-ext4 kmod-fs-vfat kmod-fs-exfat \
            kmod-nls-cp437 kmod-nls-cp936 kmod-nls-utf8 \
            luci-app-smartdns smartdns \
            luci-app-sqm sqm-scripts \
            luci-app-ddns ddns-scripts \
            luci-app-upnp miniupnpd-nftables \
            luci-app-wol \
            luci-app-hd-idle \
            nano htop curl wget \
            e2fsprogs \
          "

          echo "Building firmware for ${PROFILE}..."
          echo "Packages: ${PACKAGES}"
          echo "FILES dir: /tmp/argon-files"
          ls -la /tmp/argon-files/

          # 使用 FILES 机制将 Argon 主题文件注入根文件系统
          make image PROFILE="${PROFILE}" \
            PACKAGES="${PACKAGES}" \
            FILES="/tmp/argon-files" \
            DISABLED_SERVICES="" \
            BIN_DIR="$(pwd)/output" \
            EXTRA_IMAGE_NAME="custom"

          echo "Build completed!"
          ls -lh output/

      - name: Check firmware size
        run: |
          echo "=== 固件文件 ==="
          ls -lh openwrt-ib/output/ 2>/dev/null
          echo ""
          echo "=== 空间检查 ==="
          FIRMWARE_SIZE=$(stat -c%s openwrt-ib/output/*sysupgrade*.bin 2>/dev/null || echo 0)
          MAX_SIZE=$((16 * 1024 * 1024))  # 16MB flash
          echo "固件大小: $((FIRMWARE_SIZE / 1024 / 1024)) MB ($FIRMWARE_SIZE bytes)"
          echo "最大限制: $((MAX_SIZE / 1024 / 1024)) MB ($MAX_SIZE bytes)"
          if [ "$FIRMWARE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "❌ 固件超出 flash 空间限制!"
            exit 1
          fi
          echo "✅ 固件大小合适"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.DEVICE_NAME }}-${{ steps.version.outputs.version }}
          path: openwrt-ib/output/*
          retention-days: 30

      - name: Generate checksums
        run: |
          cd openwrt-ib/output
          sha256sum * > sha256sums.txt
          echo "=== SHA256 校验和 ==="
          cat sha256sums.txt

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: "OpenWrt ${{ steps.version.outputs.version }} for ${{ env.DEVICE_NAME }}"
          body: |
            ## OpenWrt ${{ steps.version.outputs.version }} for YouHua WR1200JS

            ### 设备信息
            - **型号**: YouHua WR1200JS
            - **SoC**: MediaTek MT7621AT (MIPS 1004Kc, 4核 880MHz)
            - **RAM**: 128MB
            - **Flash**: 16MB SPI NOR
            - **WiFi**: MT7603E (2.4G) + MT76x2E (5G)
            - **Target**: ramips/mt7621 (mipsel_24kc)

            ### 固件说明
            基于 OpenWrt 官方 ImageBuilder 定制，预装常用软件包。
            内置 Xray-core 代理内核，支持 VLESS/XHTTP/XTLS/REALITY/VLESS Encryption 等最新协议。

            ### 安装方法
            - **首次刷入**: 使用 `*-factory.bin` 通过 Web 或 TFTP 刷入
            - **升级更新**: 使用 `*-sysupgrade.bin` 通过 LuCI 或 `sysupgrade` 命令升级

            ### 安装说明
            - iStore 应用商店已预装, 可直接在 LuCI 菜单中访问
            - 通过 iStore 可一键安装各类插件 (VPN、NAS 等)
            - 建议先配置 USB extroot 扩容, 再安装大型插件

            ### 预装软件
            | 分类 | 软件 |
            |------|------|
            | 应用商店 | iStore (一键安装插件) |
            | Web 管理 | LuCI + Argon 主题 + 中文 |
            | WiFi | wpad-openssl (AP/STA/WDS/Mesh/WPA3) |
            | 拨号 | PPPoE |
            | DNS | SmartDNS |
            | QoS | SQM (抗缓冲膨胀) |
            | DDNS | 动态 DNS |
            | UPnP | miniupnpd |
            | 工具 | nano, htop, curl, wget, wol, hd-idle |
            | USB | 存储挂载 (ext4/vfat/exfat) |

            ### 硬件支持
            ✅ 所有 10 个 LED 灯 (Power/2.4G/5G/WPS/Internet/LAN1-4/USB)
            ✅ 所有 3 个按钮 (Reset/WPS/WiFi)
            ✅ 5 个千兆网口 (4 LAN + 1 WAN)
            ✅ 双频 WiFi (2.4G b/g/n + 5G a/n/ac)
            ✅ USB 3.0 端口
            ✅ 串口 (115200/8N1)
          files: |
            openwrt-ib/output/*factory*.bin
            openwrt-ib/output/*sysupgrade*.bin
            openwrt-ib/output/sha256sums.txt
          draft: false
          prerelease: false
